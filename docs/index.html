<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FoundryUI Docs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css" />
  <style>
    :root { --theme-color: #56d3b7; }
    .markdown-section { max-width: 1080px; }
    .type {
      display: inline-block;
      padding: 0.08rem 0.45rem;
      border-radius: 999px;
      color: #061014;
      font-weight: 700;
      font-size: 0.86em;
      white-space: nowrap;
    }
    .ligand { background: #249a86; }
    .protein { background: #4678d4; color: #f3f8ff; }
    .residue { background: #9062ce; color: #f8f3ff; }
    .atom { background: #e2559b; color: #fff7fb; }
    .residue-atoms { background: #b36b2c; color: #fff6eb; }
    .batch-protein { background: #2368ad; color: #f3f8ff; }
    .batch-ligand { background: #168b69; color: #effff9; }
    .complex { background: #c74b67; color: #fff7fa; }
    .sequence { background: #a3b632; color: #111500; }
    .score { background: #d28a19; color: #160e00; }
    .node-card {
      border-left: 4px solid #56d3b7;
      padding: 0.8rem 1rem;
      background: rgba(255,255,255,0.045);
      margin: 1rem 0;
    }
    .markdown-section .alert {
      margin: 1.1rem 0;
      padding: 0.85rem 1rem;
      border: 1px solid rgba(255,255,255,0.12);
      border-left-width: 5px;
      border-radius: 8px;
      background: rgba(255,255,255,0.055);
      box-shadow: 0 10px 26px rgba(0,0,0,0.18);
    }
    .markdown-section .alert .title,
    .markdown-section .alert .alert-title {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      margin-bottom: 0.5rem;
      font-size: 0.78rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .markdown-section .alert.input,
    .markdown-section .alert.alert-input {
      border-left-color: #4678d4;
      background: rgba(70,120,212,0.12);
    }
    .markdown-section .alert.input .title,
    .markdown-section .alert.input .alert-title,
    .markdown-section .alert.alert-input .title,
    .markdown-section .alert.alert-input .alert-title { color: #9fbfff; }
    .markdown-section .alert.options,
    .markdown-section .alert.alert-options {
      border-left-color: #d28a19;
      background: rgba(210,138,25,0.12);
    }
    .markdown-section .alert.options .title,
    .markdown-section .alert.options .alert-title,
    .markdown-section .alert.alert-options .title,
    .markdown-section .alert.alert-options .alert-title { color: #ffc46d; }
    .markdown-section .alert.output,
    .markdown-section .alert.alert-output {
      border-left-color: #56d3b7;
      background: rgba(86,211,183,0.12);
    }
    .markdown-section .alert.output .title,
    .markdown-section .alert.output .alert-title,
    .markdown-section .alert.alert-output .title,
    .markdown-section .alert.alert-output .alert-title { color: #84f0d8; }
    .markdown-section .alert > *:last-child { margin-bottom: 0; }
  </style>
</head>
<body>
  <div id="app">Loading FoundryUI documentation...</div>
  <script>
    window.$docsify = {
      name: 'FoundryUI',
      repo: '',
      loadSidebar: true,
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      maxLevel: 4,
      subMaxLevel: 3,
      auto2top: true,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search FoundryUI docs',
        noData: 'No results',
        depth: 6,
        hideOtherSidebarContent: false
      },
      'flexible-alerts': {
        style: 'callout',
        input: {
          label: 'Input',
          className: 'input'
        },
        options: {
          label: 'Options',
          className: 'options'
        },
        output: {
          label: 'Output',
          className: 'output'
        }
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://unpkg.com/docsify-plugin-flexible-alerts"></script>
</body>
</html>
